name: Build and Push Docker Image

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute CalVer
        id: calver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          date="$(date -u +'%Y.%m.%d')"
          date_regex="${date//./\\.}"
          package_name="${GITHUB_REPOSITORY#*/}"

          tags="$(gh api \
            --paginate \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/packages/container/${package_name}/versions?per_page=100" \
            --jq '.[].metadata.container.tags[]?' \
            2>/dev/null || true)"

          max_rev=0
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            if [[ "$tag" == "$date" ]]; then
              (( max_rev < 1 )) && max_rev=1
            elif [[ "$tag" =~ ^${date_regex}\.([0-9]+)$ ]]; then
              rev="${BASH_REMATCH[1]}"
              (( rev > max_rev )) && max_rev=$rev
            fi
          done <<< "$tags"

          version="${date}.$((max_rev + 1))"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "CalVer: $version"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.calver.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.calver.outputs.version }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
