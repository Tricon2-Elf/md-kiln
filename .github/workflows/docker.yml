name: Build and Push Docker Image

on:
  push:
    branches:
      - main

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute CalVer
        id: calver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          date="$(date -u +'%Y.%m.%d')"
          date_regex="${date//./\\.}"
          package_name="${GITHUB_REPOSITORY#*/}"
          owner="${GITHUB_REPOSITORY_OWNER}"

          owner_type="$(gh api "/repos/${GITHUB_REPOSITORY}" --jq '.owner.type')"
          if [[ "$owner_type" == "Organization" ]]; then
            versions_path="/orgs/${owner}/packages/container/${package_name}/versions?per_page=100"
          else
            versions_path="/users/${owner}/packages/container/${package_name}/versions?per_page=100"
          fi

          tags=""
          if ! tags="$(gh api \
            --paginate \
            -H "Accept: application/vnd.github+json" \
            "${versions_path}" \
            --jq '.[].metadata.container.tags[]?' \
            2>gh_api_error.log)"; then
            gh_error="$(<gh_api_error.log)"
            # First publish can return not-found when the package doesn't exist yet.
            if [[ "$gh_error" != *"404"* && "$gh_error" != *"Not Found"* ]]; then
              echo "Failed to list package versions from ${versions_path}" >&2
              echo "$gh_error" >&2
              exit 1
            fi
          fi

          max_rev=0
          while IFS= read -r tag; do
            [[ -z "$tag" ]] && continue
            if [[ "$tag" == "$date" ]]; then
              (( max_rev < 1 )) && max_rev=1
            elif [[ "$tag" =~ ^${date_regex}\.([0-9]+)$ ]]; then
              rev="${BASH_REMATCH[1]}"
              (( rev > max_rev )) && max_rev=$rev
            fi
          done <<< "$tags"

          version="${date}.$((max_rev + 1))"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "CalVer: $version"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.calver.outputs.version }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.version=${{ steps.calver.outputs.version }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
