services:
  web:
    image: ghcr.io/tricon2-elf/md-kiln:latest
    volumes:
      - ./config.json:/app/config.json
      - ./content:/app/content
      - dist:/app/dist
    environment:
      CONFIG_PATH: /app/config.json
      CONTENT_DIR: /app/content
      OUTPUT_DIR: /app/dist
      CHOKIDAR_USEPOLLING: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "test", "-f", "/app/dist/index.html"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 10s
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dist:
  caddy_data:
  caddy_config:
