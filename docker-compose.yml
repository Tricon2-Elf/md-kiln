services:
  web:
    build: .
    expose:
      - "3000"
    volumes:
      - ./config.json:/app/config.json
      - ./content:/app/content
      - ./posts:/app/posts
      - dist:/app/dist
    environment:
      API_ONLY: "true"
      CONFIG_PATH: /app/config.json
      CONTENT_DIR: /app/content
      POSTS_DIR: /app/posts
      OUTPUT_DIR: /app/dist
    healthcheck:
      test: ["CMD", "test", "-f", "/app/dist/index.html"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 10s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - dist:/app/dist:ro
      - ./public:/app/public:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dist:
