services:
  web:
    build: .
    expose:
      - "3000"
    volumes:
      - ./config.json:/app/config.json
      - ./content:/app/content
      - dist:/app/dist
    environment:
      CONFIG_PATH: /app/config.json
      CONTENT_DIR: /app/content
      OUTPUT_DIR: /app/dist
      CHOKIDAR_USEPOLLING: "true"
    healthcheck:
      test: ["CMD", "test", "-f", "/app/dist/index.html"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 10s
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    entrypoint: ["/bin/sh", "/etc/caddy/docker-entrypoint.sh"]
    ports:
      - "3000:3000"
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN:-}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/docker-entrypoint.sh:/etc/caddy/docker-entrypoint.sh:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dist:
  caddy_data:
  caddy_config:
